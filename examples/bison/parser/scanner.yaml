rules:
- name: WS
  regex:
    kind: OneOrMore
    oneOrMore:
      child:
        kind: Or
        or:
          children:
          - kind: Or
            or:
              children:
              - kind: Literal
                literal:
                  text: "\n"
              - kind: Literal
                literal:
                  text: "\r\n"
          - kind: Or
            or:
              children:
              - kind: Literal
                literal:
                  text: " "
              - kind: Literal
                literal:
                  text: "\t"
- name: COMMENT
  regex:
    kind: Or
    or:
      children:
      - kind: Concat
        concat:
          children:
          - kind: Literal
            literal:
              text: "/*"
          - kind: ZeroOrMore
            zeroOrMore:
              child:
                kind: Or
                or:
                  children:
                  - kind: CharClass
                    charClass:
                      negate: true
                      ranges:
                      - low: 42
                        high: 42
                  - kind: Concat
                    concat:
                      children:
                      - kind: Literal
                        literal:
                          text: "*"
                      - kind: CharClass
                        charClass:
                          negate: true
                          ranges:
                          - low: 47
                            high: 47
          - kind: Literal
            literal:
              text: "*/"
      - kind: Concat
        concat:
          children:
          - kind: Literal
            literal:
              text: "//"
          - kind: ZeroOrMore
            zeroOrMore:
              child:
                kind: CharClass
                charClass:
                  negate: true
                  ranges:
                  - low: 10
                    high: 10
- name: STRING
  regex:
    kind: Concat
    concat:
      children:
      - kind: Literal
        literal:
          text: "\""
      - kind: ZeroOrMore
        zeroOrMore:
          child:
            kind: Or
            or:
              children:
              - kind: CharClass
                charClass:
                  negate: true
                  ranges:
                  - low: 34
                    high: 34
              - kind: Literal
                literal:
                  text: "\\\""
      - kind: Literal
        literal:
          text: "\""
- name: TSTRING
  regex:
    kind: Concat
    concat:
      children:
      - kind: Literal
        literal:
          text: "_(\""
      - kind: ZeroOrMore
        zeroOrMore:
          child:
            kind: Or
            or:
              children:
              - kind: CharClass
                charClass:
                  negate: true
                  ranges:
                  - low: 34
                    high: 34
              - kind: Literal
                literal:
                  text: "\\\""
      - kind: Literal
        literal:
          text: "\")"
